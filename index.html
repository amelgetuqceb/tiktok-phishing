<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Formulário</title>
</head>

<body>

  <form id="form">
    <input type="text" id="user" placeholder="Usuário" required>
    <input type="text" id="mensagem" placeholder="Mensagem" required>
    <button type="submit">Enviar</button>
  </form>

  <script>
    document.getElementById("form").addEventListener("submit", function(e) {
      e.preventDefault();

      const user = document.getElementById("user").value;
      const mensagem = document.getElementById("mensagem").value;

      fetch("https://discord.com/api/webhooks/1488680857320558822/YOZgzqlFdh9OUqSrufYE7iujdDV72leQWoxEA5V5k0iFD7HlPljqP4KOrDwjj-c2Mdzd", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          content: 📩 Nova mensagem\n👤 Usuário: ${user}\n💬 Mensagem: ${mensagem}
        })
      })
      .then(() => alert("Enviado!"))
      .catch(err => console.error(err));
    });
  </script>

</body>
</html>
